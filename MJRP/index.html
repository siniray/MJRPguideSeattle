<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Majestic RP | Законка Seattle</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: url('images/fon.jpg') no-repeat center center fixed;
            background-size: cover;
            color: #e0e0e0;
            line-height: 1.6;
            padding: 20px;
            min-height: 100vh;
        }
        
        .container {
            max-width: 1300px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
            padding: 30px 20px;
            background: rgba(0, 0, 0, 0.7);
            border-radius: 30px;
            backdrop-filter: blur(5px);
            border: 1px solid #5a5a6e;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
        }

        .logo {
            font-size: 3rem;
            font-weight: bold;
            background: linear-gradient(135deg, #c0c0c0, #808080);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 10px;
            letter-spacing: 2px;
        }

        .subtitle {
            color: #a0a0b0;
            font-size: 1.1rem;
        }

        .search-container {
            max-width: 600px;
            margin: 20px auto 0;
            position: relative;
        }

        .search-box {
            display: flex;
            gap: 10px;
            background: rgba(0, 0, 0, 0.7);
            border-radius: 50px;
            padding: 5px;
            border: 1px solid #5a5a6e;
            backdrop-filter: blur(4px);
        }

        .search-input {
            flex: 1;
            background: transparent;
            border: none;
            padding: 12px 20px;
            color: #e0e0e0;
            font-size: 1rem;
            font-family: inherit;
            outline: none;
        }

        .search-input::placeholder {
            color: #6a6a7a;
        }

        .clear-search {
            background: rgba(90, 90, 110, 0.6);
            border: none;
            padding: 0 20px;
            border-radius: 50px;
            color: #e0e0e0;
            cursor: pointer;
            transition: all 0.2s ease;
            font-family: inherit;
        }

        .clear-search:hover {
            background: #5a5a6e;
        }

        .search-stats {
            text-align: center;
            margin-top: 10px;
            font-size: 0.85rem;
            color: #a0a0b0;
        }

        .codex-nav {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            justify-content: center;
            margin-bottom: 35px;
            background: rgba(0, 0, 0, 0.6);
            padding: 15px 20px;
            border-radius: 60px;
            backdrop-filter: blur(4px);
            border: 1px solid #5a5a6e;
        }

        .codex-btn {
            background: transparent;
            border: none;
            padding: 10px 24px;
            font-size: 1rem;
            font-weight: 600;
            border-radius: 40px;
            cursor: pointer;
            color: #c0c0c0;
            transition: all 0.2s ease;
            font-family: inherit;
            letter-spacing: 0.5px;
        }

        .codex-btn:hover {
            background: rgba(90, 90, 110, 0.3);
            color: #ffffff;
            transform: translateY(-2px);
        }

        .codex-btn.active {
            background: #5a5a6e;
            color: #ffffff;
            box-shadow: 0 4px 12px rgba(90, 90, 110, 0.4);
        }

        .codex-btn-all {
            background: rgba(90, 90, 110, 0.3);
        }
        .codex-btn-all:hover {
            background: #5a5a6e;
        }
        .codex-btn-all.active {
            background: #5a5a6e;
        }

        .codex-card {
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(8px);
            border-radius: 28px;
            padding: 25px 30px;
            margin-bottom: 35px;
            border-left: 5px solid #5a5a6e;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3);
        }

        .codex-title {
            font-size: 2rem;
            font-weight: 700;
            color: #c0c0c0;
            margin-bottom: 8px;
        }

        .codex-desc {
            color: #a0a0b0;
            margin-bottom: 20px;
            font-size: 0.95rem;
            border-bottom: 1px dashed rgba(90, 90, 110, 0.3);
            padding-bottom: 12px;
        }

        .articles-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 20px;
            margin-top: 15px;
        }

        /* Карточка статьи с анимацией нажатия */
        .article-card {
            background: rgba(0, 0, 0, 0.6);
            border-radius: 20px;
            padding: 18px 20px;
            border: 1px solid rgba(90, 90, 110, 0.3);
            cursor: pointer;
            position: relative;
            transform: scale(1);
            transition: transform 0.2s cubic-bezier(0.2, 0.9, 0.4, 1.1), box-shadow 0.2s ease, background 0.2s ease;
            overflow: hidden;
        }

        .article-card:hover {
            background: rgba(0, 0, 0, 0.8);
            transform: translateY(-3px);
            border-color: #5a5a6e;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.4);
        }

        .article-card:active {
            transform: scale(0.97);
            transition: transform 0.05s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* Эффект пульсации */
        @keyframes ripple {
            0% {
                transform: scale(0);
                opacity: 0.5;
            }
            100% {
                transform: scale(4);
                opacity: 0;
            }
        }

        .article-card::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(90, 90, 110, 0.5);
            transform: translate(-50%, -50%);
            pointer-events: none;
        }

        .article-card.ripple::after {
            animation: ripple 0.4s ease-out forwards;
        }

        .article-header {
            display: flex;
            align-items: baseline;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 12px;
            border-left: 3px solid #5a5a6e;
            padding-left: 12px;
        }

        .article-number {
            font-size: 1.3rem;
            font-weight: 800;
            color: #c0c0c0;
        }

        .article-name {
            font-size: 1.1rem;
            font-weight: 600;
            color: #ffffff;
        }

        .article-meta {
            font-size: 0.75rem;
            color: #8a8a9a;
            margin-bottom: 10px;
            padding-left: 15px;
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
        }

        .article-section {
            background: rgba(90, 90, 110, 0.2);
            padding: 2px 8px;
            border-radius: 12px;
            display: inline-block;
        }

        .article-chapter {
            background: rgba(0, 0, 0, 0.5);
            padding: 2px 8px;
            border-radius: 12px;
            display: inline-block;
        }

        .article-preview {
            font-size: 0.9rem;
            color: #c0c0c0;
            margin-bottom: 12px;
            line-height: 1.4;
        }

        .punishment {
            font-size: 0.8rem;
            color: #c0c0c0;
            background: rgba(90, 90, 110, 0.2);
            display: inline-block;
            padding: 4px 12px;
            border-radius: 30px;
            font-weight: 500;
        }

        .search-mode-indicator {
            background: rgba(90, 90, 110, 0.15);
            border-radius: 20px;
            padding: 8px 16px;
            text-align: center;
            margin-bottom: 20px;
            font-size: 0.9rem;
            color: #e0e0e0;
        }

        /* Модальное окно с анимацией */
        /* Модальное окно с анимацией */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0);
            backdrop-filter: blur(0px);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            padding: 20px;
            transition: background 0.3s ease, backdrop-filter 0.3s ease;
        }

        .modal.show {
            display: flex;
        }

        .modal.animate-in {
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(8px);
        }

        .modal-content {
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(12px);
            max-width: 800px;
            width: 100%;
            max-height: 85vh;
            overflow-y: auto;
            border-radius: 32px;
            padding: 30px;
            border: 1px solid #5a5a6e;
            box-shadow: 0 25px 40px rgba(0, 0, 0, 0.5);
            transform: scale(0.95);
            opacity: 0;
            transition: transform 0.3s cubic-bezier(0.34, 1.2, 0.64, 1), opacity 0.3s ease;
        }

        .modal.show .modal-content {
            transform: scale(1);
            opacity: 1;
        }

        .modal.closing {
            background: rgba(0, 0, 0, 0);
            backdrop-filter: blur(0px);
        }

        .modal.closing .modal-content {
            transform: scale(0.95);
            opacity: 0;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            border-bottom: 1px solid #5a5a6e;
            padding-bottom: 15px;
        }

        .modal-title {
            font-size: 1.8rem;
            font-weight: bold;
            color: #c0c0c0;
        }

        .close-modal {
            background: none;
            border: none;
            font-size: 2rem;
            cursor: pointer;
            color: #a0a0b0;
            transition: 0.2s;
        }

        .close-modal:hover {
            color: #c0c0c0;
            transform: rotate(90deg);
        }

        .modal-body {
            color: #e0e0e0;
            line-height: 1.6;
        }

        .modal-punish {
            margin-top: 20px;
            background: rgba(90, 90, 110, 0.2);
            padding: 12px 16px;
            border-radius: 20px;
            font-weight: 500;
            color: #c0c0c0;
        }

        .footer {
            text-align: center;
            margin-top: 50px;
            padding: 20px;
            font-size: 0.85rem;
            color: #a0a0b0;
            border-top: 1px solid rgba(90, 90, 110, 0.3);
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(4px);
            border-radius: 10px;
        }

        @media (max-width: 700px) {
            .codex-nav {
                border-radius: 30px;
                gap: 8px;
            }
            .codex-btn {
                padding: 6px 16px;
                font-size: 0.85rem;
            }
            .codex-title {
                font-size: 1.5rem;
            }
            .articles-grid {
                grid-template-columns: 1fr;
            }
            .search-box {
                flex-wrap: wrap;
            }
            .clear-search {
                padding: 8px 16px;
            }
            .article-meta {
                font-size: 0.7rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo">MJ|RP seattle</div>
            <div class="subtitle">Конституция и законы штата Сан-Андреас</div>
            
            <div class="search-container">
                <div class="search-box">
                    <input type="text" class="search-input" id="searchInput" placeholder="Поиск по статьям...">
                    <button class="clear-search" id="clearSearchBtn">Сброс</button>
                </div>
                <div class="search-stats" id="searchStats"></div>
            </div>
        </div>

        <div class="codex-nav" id="codexNav"></div>
        <div id="codexContainer"></div>

        <div class="footer">
            Настоящий сайт не является официальным ресурсом проекта Majestic RP и не имеет никакого отношения к его разработчикам, администрации или правообладателям. Данный ресурс создан на энтузиазме игроками - для игроков, в некоммерческих целях.
        </div>
    </div>

    <div id="articleModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <span class="modal-title" id="modalTitle"></span>
                <button class="close-modal" id="closeModalBtn">&times;</button>
            </div>
            <div class="modal-body" id="modalBody"></div>
            <div class="modal-punish" id="modalPunish"></div>
        </div>
    </div>

    <script src="laws.js"></script>
    <script>
        let currentCodexId = null;
        let isSearchMode = false;
        let currentSearchQuery = '';
        let searchDebounceTimer = null;

        function renderNavigation() {
            const navContainer = document.getElementById('codexNav');
            navContainer.innerHTML = '';
            
            const allBtn = document.createElement('button');
            allBtn.className = 'codex-btn codex-btn-all';
            if (!isSearchMode && currentCodexId === 'all') allBtn.classList.add('active');
            allBtn.textContent = 'Всё';
            allBtn.addEventListener('click', () => {
                if (isSearchMode) {
                    isSearchMode = false;
                    currentSearchQuery = '';
                    document.getElementById('searchInput').value = '';
                    document.getElementById('searchStats').innerHTML = '';
                }
                currentCodexId = 'all';
                renderNavigation();
                renderAllCodexes();
            });
            navContainer.appendChild(allBtn);
            
            MajesticLaws.forEach(codex => {
                const btn = document.createElement('button');
                btn.className = 'codex-btn';
                if (!isSearchMode && currentCodexId === codex.id) btn.classList.add('active');
                btn.textContent = codex.title;
                btn.addEventListener('click', () => {
                    if (isSearchMode) {
                        isSearchMode = false;
                        currentSearchQuery = '';
                        document.getElementById('searchInput').value = '';
                        document.getElementById('searchStats').innerHTML = '';
                    }
                    currentCodexId = codex.id;
                    renderNavigation();
                    renderCodexContent(codex.id);
                });
                navContainer.appendChild(btn);
            });
        }

        function renderCodexContent(codexId) {
            const codex = MajesticLaws.find(c => c.id === codexId);
            if (!codex) return;
            
            const container = document.getElementById('codexContainer');
            container.innerHTML = `
                <div class="codex-card">
                    <div class="codex-title">${escapeHtml(codex.title)}</div>
                    <div class="codex-desc">${escapeHtml(codex.description)}</div>
                    <div class="articles-grid" id="articlesGrid"></div>
                </div>
            `;
            
            const grid = document.getElementById('articlesGrid');
            codex.articles.forEach(article => {
                const articleCard = createArticleCard(article);
                grid.appendChild(articleCard);
            });
        }
        
        function renderAllCodexes() {
            const container = document.getElementById('codexContainer');
            let html = '';
            
            MajesticLaws.forEach(codex => {
                html += `
                    <div class="codex-card">
                        <div class="codex-title">${escapeHtml(codex.title)}</div>
                        <div class="codex-desc">${escapeHtml(codex.description)}</div>
                        <div class="articles-grid" id="articlesGrid_${codex.id.replace(/[^a-zA-Z0-9]/g, '_')}"></div>
                    </div>
                `;
            });
            
            container.innerHTML = html;
            
            MajesticLaws.forEach(codex => {
                const gridId = `articlesGrid_${codex.id.replace(/[^a-zA-Z0-9]/g, '_')}`;
                const grid = document.getElementById(gridId);
                if (grid) {
                    codex.articles.forEach(article => {
                        const articleCard = createArticleCard(article);
                        grid.appendChild(articleCard);
                    });
                }
            });
        }
        
        function renderSearchResults(results, searchQuery) {
            const container = document.getElementById('codexContainer');
            
            if (results.length === 0) {
                container.innerHTML = `
                    <div class="codex-card">
                        <div class="codex-title">Результаты поиска</div>
                        <div class="codex-desc">По запросу <strong>"${escapeHtml(searchQuery)}"</strong> ничего не найдено. Попробуйте изменить поисковый запрос.</div>
                    </div>
                `;
                return;
            }
            
            const resultsByCodex = {};
            results.forEach(result => {
                if (!resultsByCodex[result.codexId]) {
                    const codex = MajesticLaws.find(c => c.id === result.codexId);
                    resultsByCodex[result.codexId] = {
                        title: codex.title,
                        description: codex.description,
                        articles: []
                    };
                }
                resultsByCodex[result.codexId].articles.push(result.article);
            });
            
            let html = `
                <div class="search-mode-indicator">
                    Результаты поиска по запросу <strong>"${escapeHtml(searchQuery)}"</strong><br>
                    Найдено статей: ${results.length}
                </div>
            `;
            
            for (const [codexId, data] of Object.entries(resultsByCodex)) {
                html += `
                    <div class="codex-card">
                        <div class="codex-title">${escapeHtml(data.title)}</div>
                        <div class="codex-desc">${escapeHtml(data.description)}</div>
                        <div class="articles-grid" id="searchGrid_${codexId.replace(/[^a-zA-Z0-9]/g, '_')}"></div>
                    </div>
                `;
            }
            
            container.innerHTML = html;
            
            for (const [codexId, data] of Object.entries(resultsByCodex)) {
                const safeId = `searchGrid_${codexId.replace(/[^a-zA-Z0-9]/g, '_')}`;
                const grid = document.getElementById(safeId);
                if (grid) {
                    data.articles.forEach(article => {
                        const articleCard = createArticleCard(article);
                        grid.appendChild(articleCard);
                    });
                }
            }
        }

        function formatText(text) {
            if (!text) return '';
            
            const lines = text.split('\n');
            let result = '';
            
            for (let i = 0; i < lines.length; i++) {
                let line = lines[i];
                if (line.trim()) {
                    result += `<p style="white-space: pre-line;">${escapeHtml(line)}</p>`;
                } else {
                    result += '<br>';
                }
            }
            
            return result;
        }

        function createArticleCard(article) {
            const articleCard = document.createElement('div');
            articleCard.className = 'article-card';
            
            let previewText = article.shortDescription || (article.fullText ? article.fullText.substring(0, 150) + '...' : '');
            
            let metaHtml = '';
            if (article.section) {
                metaHtml += `<span class="article-section">${escapeHtml(article.section)}</span>`;
            }
            if (article.chapter) {
                metaHtml += `<span class="article-chapter">${escapeHtml(article.chapter)}</span>`;
            }
            
            articleCard.innerHTML = `
                <div class="article-header">
                    <span class="article-number">${escapeHtml(article.number)}</span>
                    <span class="article-name">${escapeHtml(article.name)}</span>
                </div>
                ${metaHtml ? `<div class="article-meta">${metaHtml}</div>` : ''}
                <div class="article-preview">${escapeHtml(previewText)}</div>
                ${article.punishment ? `<div class="punishment">${escapeHtml(article.punishment)}</div>` : ''}
            `;
            
            // Добавляем анимацию при клике
            articleCard.addEventListener('click', (e) => {
                // Эффект пульсации
                articleCard.classList.add('ripple');
                
                // Добавляем эффект нажатия
                articleCard.style.transform = 'scale(0.97)';
                
                // Запускаем открытие модального окна с небольшой задержкой
                setTimeout(() => {
                    showArticleModal(article);
                }, 80);
                
                // Возвращаем размер через 100ms
                setTimeout(() => {
                    articleCard.style.transform = '';
                }, 100);
                
                // Убираем класс ripple после анимации
                setTimeout(() => {
                    articleCard.classList.remove('ripple');
                }, 400);
            });
            
            return articleCard;
        }

        function searchArticles(query) {
            if (!query || query.trim() === '') return [];
            
            const searchTerm = query.toLowerCase().trim();
            const results = [];
            
            MajesticLaws.forEach(codex => {
                codex.articles.forEach(article => {
                    const searchableText = `
                        ${article.number} 
                        ${article.name} 
                        ${article.section || ''}
                        ${article.chapter || ''}
                        ${article.shortDescription || ''} 
                        ${article.fullText}
                    `.toLowerCase();
                    
                    if (searchableText.includes(searchTerm)) {
                        results.push({
                            codexId: codex.id,
                            article: article
                        });
                    }
                });
            });
            
            return results;
        }

        function performDynamicSearch() {
            const searchInput = document.getElementById('searchInput');
            const query = searchInput.value;
            
            if (searchDebounceTimer) clearTimeout(searchDebounceTimer);
            
            searchDebounceTimer = setTimeout(() => {
                if (!query || query.trim() === '') {
                    if (isSearchMode) {
                        isSearchMode = false;
                        currentSearchQuery = '';
                        renderNavigation();
                        currentCodexId = 'all';
                        renderAllCodexes();
                        document.getElementById('searchStats').innerHTML = '';
                    }
                    return;
                }
                
                const results = searchArticles(query);
                currentSearchQuery = query;
                isSearchMode = true;
                renderNavigation();
                renderSearchResults(results, query);
                
                const statsDiv = document.getElementById('searchStats');
                statsDiv.innerHTML = `Найдено статей: ${results.length}`;
            }, 300);
        }

        function clearSearch() {
            document.getElementById('searchInput').value = '';
            document.getElementById('searchStats').innerHTML = '';
            isSearchMode = false;
            currentSearchQuery = '';
            renderNavigation();
            currentCodexId = 'all';
            renderAllCodexes();
        }

        function showArticleModal(article) {
            const modal = document.getElementById('articleModal');
            let formattedText = formatText(article.fullText);
            
            let titleHtml = `${escapeHtml(article.number)} — ${escapeHtml(article.name)}`;
            if (article.section || article.chapter) {
                titleHtml += '<div style="font-size: 0.8rem; color: #8a8a9a; margin-top: 5px;">';
                if (article.section) titleHtml += `<span>${escapeHtml(article.section)}</span>`;
                if (article.chapter) titleHtml += `<span style="margin-left: 10px;">${escapeHtml(article.chapter)}</span>`;
                titleHtml += '</div>';
            }
            
            document.getElementById('modalTitle').innerHTML = titleHtml;
            document.getElementById('modalBody').innerHTML = formattedText;
            
            if (article.punishment) {
                document.getElementById('modalPunish').innerHTML = `Наказание: ${escapeHtml(article.punishment)}`;
                document.getElementById('modalPunish').style.display = 'block';
            } else {
                document.getElementById('modalPunish').style.display = 'none';
            }
            
            // Сначала полностью убираем все классы
            modal.classList.remove('show', 'animate-in', 'closing');
            
            // Принудительно перезапускаем CSS-анимацию
            void modal.offsetHeight; // форсируем reflow
            
            // Показываем модальное окно
            modal.classList.add('show');
            
            // Небольшая задержка для запуска анимации
            setTimeout(() => {
                modal.classList.add('animate-in');
            }, 10);
        }

        function closeModal() {
            const modal = document.getElementById('articleModal');
            modal.classList.add('closing');
            setTimeout(() => {
                modal.classList.remove('show');
                modal.classList.remove('closing');
            }, 300);
        }

        function escapeHtml(str) {
            if (!str) return '';
            return str
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }

        if (typeof MajesticLaws !== 'undefined') {
            currentCodexId = 'all';
            renderNavigation();
            renderAllCodexes();
        } else {
            document.getElementById('codexContainer').innerHTML = '<div class="codex-card"><p style="color:#c0c0c0;">Ошибка: не загружен файл с законами (laws.js).</p></div>';
        }

        const modal = document.getElementById('articleModal');
        const closeBtn = document.getElementById('closeModalBtn');
        closeBtn.onclick = () => closeModal();
        window.onclick = (e) => { if (e.target === modal) closeModal(); };
        
        const searchInput = document.getElementById('searchInput');
        const clearSearchBtn = document.getElementById('clearSearchBtn');
        
        searchInput.addEventListener('input', performDynamicSearch);
        clearSearchBtn.addEventListener('click', clearSearch);
    </script>
</body>
</html>
